name: Build and deploy

# Builds the Docusaurus site on every push to main, deploys to Firebase Hosting,
# then pings IndexNow so Bing / Yandex pick up changed URLs without waiting
# for the next crawl. PRs trigger a build only (no deploy) so contributors
# see a green check before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
          retention-days: 7

  deploy:
    name: Deploy to Firebase Hosting
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Deploy
        # Uses Firebase's official deploy action with a service-account JSON
        # stored in the FIREBASE_SERVICE_ACCOUNT secret. See
        # docs/handover/USER-DEPLOYMENT-CHECKLIST.md §3 for setup steps.
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: smsapp-docs
          channelId: live

  indexnow:
    name: Ping IndexNow
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Ping
        # Pushes the full sitemap URL list to api.indexnow.org. Bing + Yandex
        # both honour IndexNow; Google does not but accepts via Search Console.
        # The key file at static/8e87c3ef6a229adecc30897529af80dc.txt is what
        # IndexNow's validation step looks for.
        run: yarn indexnow
